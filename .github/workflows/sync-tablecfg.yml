name: Sync TableCfg

on:
  schedule:
    - cron: "17 20 * * *"
  workflow_dispatch:

permissions:
  contents: write
  actions: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true

      - name: Sync TableCfg
        run: uv run --locked sync_tablecfg.py

      - name: Detect changes
        id: changes
        run: |
          if git diff --quiet -- TableCfg; then
            echo "tablecfg_changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "tablecfg_changed=true" >> "$GITHUB_OUTPUT"
          fi

          if git diff --quiet -- TableCfg .github/tablecfg-sync-state.json; then
            echo "any_changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "any_changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Commit and push TableCfg changes
        if: steps.changes.outputs.any_changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add TableCfg/ .github/tablecfg-sync-state.json
          git commit -m "🍱 update gacha pool table cfg"
          git push

      - name: Trigger gacha data update
        if: steps.changes.outputs.tablecfg_changed == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh workflow run update-gacha.yml --ref "${GITHUB_REF_NAME}"
